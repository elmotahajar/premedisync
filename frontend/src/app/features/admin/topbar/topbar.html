<header class="topbar">
  <!-- Left: Hamburger Menu -->
  <div class="topbar-left">
    <button class="hamburger-btn" (click)="onToggleSidebar()" title="Toggle sidebar">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
  </div>

  <!-- Center: Page Title -->
  <div class="topbar-center">
    <h2 class="page-title">{{ pageTitle }}</h2>
  </div>

  <!-- Right: Notifications + Profile -->
  <div class="topbar-right">
    <!-- Notifications -->
    <button class="icon-btn notification-btn" (click)="onNotifications()" title="Notifications">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
      @if (notificationCount() > 0) {
        <span class="badge">{{ notificationCount() }}</span>
      }
    </button>

    <!-- Profile Dropdown -->
    <div class="profile-section">
      <button class="profile-btn" (click)="onToggleProfileMenu()">
        <div class="avatar">👤</div>
        <span class="profile-name">Admin</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="chevron">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>

      <!-- Dropdown Menu -->
      @if (profileMenuOpen()) {
        <div class="profile-menu">
          <a href="#" class="menu-item" (click)="onProfile(); $event.preventDefault()">
            <span class="menu-icon">👤</span>
            <span>Mon profil</span>
          </a>
          <a href="#" class="menu-item" (click)="onProfile(); $event.preventDefault()">
            <span class="menu-icon">⚙️</span>
            <span>Paramètres</span>
          </a>
          <div class="menu-divider"></div>
          <button class="menu-item logout-item" (click)="onLogout()">
            <span class="menu-icon">🚪</span>
            <span>Déconnexion</span>
          </button>
        </div>
      }
    </div>
  </div>
</header>
