<div class="container">
  <div class="header">
    <button class="btn-back" (click)="retour()">← Retour</button>
    <h1>Journal d'Audit</h1>
  </div>

  <!-- FILTRES -->
  <div class="filtres">
    <div class="filtre-group">
      <label>Action :</label>
      <select [(ngModel)]="filtreAction">
        <option *ngFor="let a of actions" [value]="a">{{ a | titlecase }}</option>
      </select>
    </div>

    <div class="filtre-group">
      <label>Rôle :</label>
      <select [(ngModel)]="filtreRole">
        <option *ngFor="let r of roles" [value]="r">{{ r | titlecase }}</option>
      </select>
    </div>

    <div class="filtre-group">
      <label>Recherche :</label>
      <input type="text" placeholder="Utilisateur, action..." [(ngModel)]="searchText">
    </div>
  </div>

  <!-- TABLEAU DES LOGS -->
  <table class="table">
    <thead>
      <tr>
        <th>Date</th><th>Heure</th><th>Utilisateur</th><th>Rôle</th><th>Action</th><th>Détails</th><th>IP</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let log of logsFiltres">
        <td>{{ log.date }}</td>
        <td>{{ log.heure }}</td>
        <td>{{ log.utilisateur }}</td>
        <td><span [class]="getRoleClass(log.role)">{{ getRoleTexte(log.role) }}</span></td>
        <td>{{ log.action }}</td>
        <td>{{ log.details }}</td>
        <td>{{ log.ip }}</td>
      </tr>
      <tr *ngIf="logsFiltres.length === 0">
        <td colspan="7" class="empty">Aucun log trouvé</td>
      </tr>
    </tbody>
  </table>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">Total logs : {{ logs.length }}</div>
    <div class="stat">Logs filtrés : {{ logsFiltres.length }}</div>
  </div>
</div>
