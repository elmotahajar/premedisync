<div class="container">
  <div class="header">
    <button class="btn-back" (click)="retour()">← Retour</button>
    <h1>Gestion de l'Établissement</h1>
  </div>

  <div class="message" *ngIf="message">{{ message }}</div>

  <div class="form-card">
    <h2>Informations générales</h2>
    
    <label>Nom de la clinique</label>
    <input type="text" [(ngModel)]="clinique.nom">

    <label>Adresse</label>
    <textarea [(ngModel)]="clinique.adresse" rows="2"></textarea>

    <div class="row">
      <div class="col">
        <label>Téléphone</label>
        <input type="text" [(ngModel)]="clinique.telephone">
      </div>
      <div class="col">
        <label>Email</label>
        <input type="email" [(ngModel)]="clinique.email">
      </div>
    </div>

    <label>Horaires d'ouverture</label>
    <input type="text" [(ngModel)]="clinique.horaires">

    <label>Présentation</label>
    <textarea [(ngModel)]="clinique.presentation" rows="3"></textarea>

    <button class="btn-save" (click)="sauvegarder()">Sauvegarder</button>
  </div>

  <div class="form-card">
    <h2>Spécialités proposées</h2>
    
    <div class="specialites-list">
      <span class="tag" *ngFor="let spec of specialites; let i = index">
        {{ spec }}
        <button class="remove" (click)="supprimerSpecialite(i)">✖</button>
      </span>
    </div>

    <div class="add-specialite">
      <input type="text" placeholder="Nouvelle spécialité" [(ngModel)]="nouvelleSpecialite">
      <button class="btn-add" (click)="ajouterSpecialite()">Ajouter</button>
    </div>
  </div>
</div>
