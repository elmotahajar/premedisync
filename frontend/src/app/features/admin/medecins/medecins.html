<div class="container admin-page">
  <div class="header">
    <button class="btn-back" type="button" (click)="retour()">← Retour</button>
    <h1>Gestion des Médecins</h1>
    <button class="btn-add" type="button" (click)="ajouter()">+ Nouveau médecin</button>
  </div>

  <div class="message" *ngIf="message">{{ message }}</div>

  <table class="table">
    <thead>
      <tr>
        <th>Nom</th><th>Prénom</th><th>Spécialité</th><th>Email</th><th>Tarif</th><th>Statut</th><th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let m of medecins">
        <td>{{ m.nom }}</td>
        <td>{{ m.prenom }}</td>
        <td>{{ m.specialite }}</td>
        <td>{{ m.email }}</td>
        <td>{{ m.tarif }} €</td>
        <td><span class="badge" [class.active]="m.actif" [class.inactive]="!m.actif">{{ m.actif ? 'Actif' : 'Inactif' }}</span></td>
        <td class="actions">
          <button class="icon-btn view" type="button" title="Voir" (click)="modifier(m)"><svg lucideEye></svg></button>
          <button class="icon-btn edit" type="button" title="Modifier" (click)="modifier(m)"><svg lucidePencil></svg></button>
          <button class="icon-btn delete" type="button" title="Supprimer" (click)="supprimer(m.id)"><svg lucideTrash2></svg></button>
          <button class="toggle-btn" type="button" (click)="toggleActif(m)">{{ m.actif ? 'Disponible' : 'Inactif' }}</button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- MODAL -->
  <div class="modal-overlay" *ngIf="showModal" (click)="fermerModal()"></div>
  <div class="modal-box" *ngIf="showModal">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>{{ editMode ? 'Modifier' : 'Ajouter' }} un médecin</h3>
        <button class="close" type="button" (click)="fermerModal()">✖</button>
      </div>
      <div class="modal-body">
        <input class="admin-input" placeholder="Nom" [(ngModel)]="currentMedecin.nom">
        <input class="admin-input" placeholder="Prénom" [(ngModel)]="currentMedecin.prenom">
        <select class="admin-select" [(ngModel)]="currentMedecin.specialite">
          <option value="">Sélectionner spécialité</option>
          <option *ngFor="let s of specialites" [value]="s">{{ s }}</option>
        </select>
        <input class="admin-input" placeholder="Email" type="email" [(ngModel)]="currentMedecin.email">
        <input class="admin-input" placeholder="Téléphone" [(ngModel)]="currentMedecin.telephone">
        <input *ngIf="!editMode" class="admin-input" placeholder="Mot de passe" type="password" [(ngModel)]="currentMedecin.password">
      </div>
      <div class="modal-footer">
        <button class="cancel" type="button" (click)="fermerModal()">Annuler</button>
        <button class="save" type="button" (click)="sauvegarder()">Sauvegarder</button>
      </div>
    </div>
  </div>
</div>
