<div class="profil-container">
  <div class="profil-card">
    <div class="profil-header">
      <div class="avatar">👤</div>
      <h2>Mon Profil</h2>
      <p>Modifier vos informations personnelles</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="soumettre()">
      <div class="form-row">
        <div class="form-group">
          <label>Nom</label>
          <input formControlName="nom" type="text" placeholder="Votre nom" />
          <span class="error" *ngIf="champInvalide('nom')">Nom requis</span>
        </div>
        <div class="form-group">
          <label>Prénom</label>
          <input formControlName="prenom" type="text" placeholder="Votre prénom" />
          <span class="error" *ngIf="champInvalide('prenom')">Prénom requis</span>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input formControlName="email" type="email" placeholder="Votre email" />
        <span class="error" *ngIf="champInvalide('email')">Email invalide</span>
      </div>

      <div class="form-group">
        <label>Téléphone</label>
        <input formControlName="telephone" type="tel" placeholder="Votre téléphone" />
        <span class="error" *ngIf="champInvalide('telephone')">Téléphone requis</span>
      </div>

      <div class="form-group">
        <label>Date de naissance</label>
        <input formControlName="dateNaissance" type="date" />
        <span class="error" *ngIf="champInvalide('dateNaissance')">Date requise</span>
      </div>

      <div class="form-group">
        <label>Adresse</label>
        <input formControlName="adresse" type="text" placeholder="Votre adresse" />
        <span class="error" *ngIf="champInvalide('adresse')">Adresse requise</span>
      </div>

      <div class="success" *ngIf="successMessage">{{ successMessage }}</div>

      <div class="buttons">
        <button type="button" class="btn-retour" (click)="retour()">← Retour</button>
        <button type="submit" class="btn-save">Enregistrer</button>
      </div>
    </form>
  </div>
</div>
