<div class="dashboard">
  <header class="header">
    <h1>MediSync</h1>
    <div class="user-info">
      <span>Bonjour, Secrétaire</span>
      <button (click)="seDeconnecter()">Se déconnecter</button>
    </div>
  </header>

  <main class="main">
    <h2>Espace Secrétaire</h2>

    <div class="cards">
      <div class="card" routerLink="/secretaire/rdv">
        <span class="icon">📅</span>
        <h3>Gestion des RDV</h3>
        <p>Créer, modifier et annuler des rendez-vous</p>
      </div>

      <div class="card" routerLink="/secretaire/patients">
        <span class="icon">👤</span>
        <h3>Créer un Patient</h3>
        <p>Inscrire un nouveau patient</p>
      </div>

      <div class="card" routerLink="/secretaire/facturation">
        <span class="icon">🧾</span>
        <h3>Facturation</h3>
        <p>Émettre et gérer les factures</p>
      </div>

      <div class="card" routerLink="/secretaire/feuille-soins">
        <span class="icon">📋</span>
        <h3>Feuilles de Soins</h3>
        <p>Saisir les actes et générer les feuilles de soins</p>
      </div>
    </div>
  </main>
</div>
