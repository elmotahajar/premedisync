<div class="container">
  <header class="header">
    <h1>MediSync</h1>
    <a routerLink="/patient/rendezvous">← Retour</a>
  </header>

  <main class="main">
    <h2>Prendre un Rendez-vous</h2>

    <!-- Filtres de recherche -->
    <div class="filtres">
      <select [(ngModel)]="specialiteChoisie">
        <option value="">Toutes les spécialités</option>
        @for (specialite of specialites; track specialite) {
          <option [value]="specialite">{{ specialite }}</option>
        }
      </select>
    </div>

    <!-- Liste des médecins -->
    <div class="medecins">
      @for (medecin of medecinsFiltres(); track medecin.id) {
        <div class="card-medecin">
          <div class="info">
            <h3>Dr. {{ medecin.nom }}</h3>
            <p>{{ medecin.specialite }}</p>
            <p>📍 {{ medecin.ville }}</p>
          </div>
          <button type="button" (click)="choisirMedecin(medecin)">
            Prendre RDV
          </button>
        </div>
      }
    </div>
  </main>
</div>
