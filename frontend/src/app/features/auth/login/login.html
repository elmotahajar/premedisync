<section class="auth-shell">
  <div class="auth-panel">
    <div class="brand-block">
      <p class="eyebrow">MediSync</p>
      <h1>Connexion sécurisée</h1>
      <p class="subtitle">Accédez à votre espace patient, médecin, secrétaire ou administrateur.</p>
    </div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="connexion()">
      <div class="form-field">
        <label for="email">Email</label>
        <input id="email" class="form-input" type="email" formControlName="email" placeholder="votre@email.com" />
        @if (champInvalide('email')) {
          <small class="error">Entrez un email valide.</small>
        }
      </div>

      <div class="form-field">
        <label for="password">Mot de passe</label>
        <input id="password" class="form-input" type="password" formControlName="password" placeholder="Votre mot de passe" />
        @if (champInvalide('password')) {
          <small class="error">Le mot de passe doit contenir au moins 8 caractères.</small>
        }
      </div>

      @if (erreur()) {
        <div class="alert alert-error">{{ erreur() }}</div>
      }

      <button class="primary-btn" type="submit" [disabled]="chargement()">
        {{ chargement() ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <p class="switch-link">
      Nouveau ici ? <button type="button" class="text-btn" (click)="allerInscription()">Créer un compte</button>
    </p>
  </div>
</section>
