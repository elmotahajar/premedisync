<div class="container">
  <div class="card">
    <h1>MediSync</h1>
    <h2>Créer un compte</h2>

    <form [formGroup]="form" (ngSubmit)="soumettre()">
      <div class="form-row">
        <div class="form-group">
          <label>Nom</label>
          <input formControlName="nom" type="text" placeholder="Dupont" />
          @if (champInvalide('nom')) {
            <span class="erreur">Minimum 2 caractères</span>
          }
        </div>

        <div class="form-group">
          <label>Prénom</label>
          <input formControlName="prenom" type="text" placeholder="Alice" />
          @if (champInvalide('prenom')) {
            <span class="erreur">Minimum 2 caractères</span>
          }
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input formControlName="email" type="email" placeholder="votre@email.com" />
        @if (champInvalide('email')) {
          <span class="erreur">Email invalide</span>
        }
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input formControlName="motDePasse" type="password" placeholder="••••••••" />
        @if (champInvalide('motDePasse')) {
          <span class="erreur">Minimum 8 caractères</span>
        }
      </div>

      <div class="form-group">
        <label>Téléphone <span class="optionnel">(optionnel)</span></label>
        <input formControlName="telephone" type="tel" placeholder="0600000000" />
      </div>

      <button type="button" (click)="soumettre()">S'inscrire</button>
    </form>

    <p>Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
  </div>
</div>
